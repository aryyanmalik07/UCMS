<!DOCTYPE html>
<html>
<head>
    <title>Register - UCMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <style>

        body{
            background: url('/static/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .overlay{
            background: rgba(0,0,0,0.20);
            min-height: 100vh;
        }

        .navbar-custom{
            background: rgba(0,0,0,0.75);
            margin: 15px;
            border-radius: 0px;
            padding: 12px 20px;
        }
        .register-card{
    width: 100%;
    max-width: 360px;   /* smaller card */
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    padding: 24px;      /* reduced padding */
    box-shadow: 0px 8px 30px rgba(0,0,0,0.25);
}

.logo{
    width: 42px;        /* smaller logo */
    height: 42px;
}

.form-control,
.form-select{
    height: 42px;       /* smaller fields */
    border-radius: 10px;
}

.btn-register{
    height: 42px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
}

        .register-container{
            min-height: 82vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>

</head>

<body>

<div class="overlay">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-custom">

        <div class="d-flex align-items-center">

            <img src="/static/logo.png"
                 class="logo me-2">

            <h3 class="text-white m-0">
                UCMS
            </h3>

        </div>

        <a href="/login"
           class="btn btn-light btn-sm">

            Login

        </a>

    </nav>

    <!-- REGISTER CARD -->
    <div class="container register-container">

        <div class="register-card">

            <!-- LOGO -->
            <div class="text-center mb-2">

                <img src="/static/logo.png"
                     class="logo">

            </div>

            <!-- HEADING -->
            <h1 class="text-center fw-bold mb-2">
                Register
            </h1>

            <!-- FORM -->
            <form method="POST">

                <!-- USERNAME -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           required>

                </div>

                <!-- EMAIL -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           required>

                </div>

                <!-- PASSWORD -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           required>

                </div>

                <!-- ROLE -->
                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Role
                    </label>

                    <select name="role"
                            class="form-select"
                            required>

                        <option value="student">
                            Student
                        </option>

                        <option value="staff">
                            Staff
                        </option>

                        <option value="admin">
                            Admin
                        </option>

                    </select>

                </div>

                <!-- BUTTON -->
                <button class="btn btn-primary w-100 btn-register">

                    Create Account

                </button>

            </form>

            <!-- LOGIN LINK -->
            <div class="text-center mt-4">

                Already have account?

                <a href="/login"
                   class="fw-bold text-decoration-none">

                    Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
