<!DOCTYPE html>
<html>
<head>
    <title>Login - UCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">
<div class="overlay">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand d-flex align-items-center">
        <img src="/static/logo.png" width="35" height="35" class="me-2">
        UCMS
    </a>
</nav>

<!-- LOGIN BOX -->
<div class="d-flex justify-content-center align-items-center" style="height:85vh;">

    <div class="card p-4 shadow" style="width:360px; border-radius:12px;">

        <div class="text-center mb-3">
    <img src="/static/logo.png" width="60">
</div>

        <h3 class="text-center">Login</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Username</label>
                <input class="form-control" name="username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <p class="text-center mt-3">
            Don't have account? <a href="/register">Register</a>
        </p>

    </div>

</div>
<!-- Login Page -Body -->
</body>
</html>
