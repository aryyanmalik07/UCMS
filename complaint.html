<!DOCTYPE html>
<html>
<head>
    <title>Submit Complaint - UCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard">UCMS</a>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container mt-5">

    <div class="card p-4 shadow" style="max-width:600px; margin:auto;">

        <h3 class="text-center mb-3">Submit Complaint 📩</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary w-100">Submit Complaint</button>

        </form>

    </div>

</div>

</body>
</html>
